{% set name = "blop" %}
{% set version = "1.0.0b1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/blop-{{ version }}.tar.gz
  sha256: 9ff0f0b0ed60186892af1e6b427c5fdefa0906e1db8b2364857236b0aed93334

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatch-vcs
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - python-tsp
    - ax-platform >=1.1.0,<1.3
    - bluesky-base >=1.14.2,<2
    - pytorch
    - botorch >=0.16.0,<0.17
    - gpytorch
    - scipy
    - numpy
    - networkx >=3
    - rich>=13

test:
  imports:
    # The list of imports is generated via the following command:
    #   $ cd <blop-repo>/src
    #   $ find blop -name "*.py" | grep -v tests | sed 's/.__init__.py//g' | sed 's/._version//g' | sed 's;/;.;g' | sed 's/\.py//g'| sort -u
    - blop
    - blop.ax
    - blop.ax.agent
    - blop.ax.dof
    - blop.ax.objective
    - blop.ax.optimizer
    - blop.bayesian
    - blop.bayesian.kernels
    - blop.bayesian.models
    - blop.callbacks
    - blop.callbacks.logger
    - blop.callbacks.router
    - blop.callbacks.utils
    - blop.plan_stubs
    - blop.plans
    - blop.protocols
    - blop.queueserver
    - blop.utils
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/bluesky/blop
  summary: Bluesky optimization package
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  doc_url: https://blueskyproject.io/blop

extra:
  recipe-maintainers:
    - mrakitin
    - thomaswmorris
    - thopkins32
